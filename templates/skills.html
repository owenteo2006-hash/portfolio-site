{% extends "base.html" %}
{% block title %}Skills — Owen Teo{% endblock %}

{% block content %}
<section class="section page-header">
  <div class="container">
    <h1>Skills</h1>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="skills-grid">
      {% for category, items in skills.items() %}
      <div class="skill-group">
        <h3>{{ category }}</h3>
        <ul class="skill-list">
          {% for item in items %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
